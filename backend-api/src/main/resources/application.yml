spring:
  application:
    name: qoe-api
  datasource:
    url: jdbc:postgresql://localhost:5432/qoe_db
    username: qoe_user
    password: qoe_password
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

springdoc:
  # Defaults: /v3/api-docs and /swagger-ui/index.html (avoid custom paths that confuse some clients)
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.devopsdays.qoe: DEBUG
    org.springframework.web: INFO

newrelic:
  enabled: ${NEWRELIC_ENABLED:false}
  license-key: ${NEWRELIC_LICENSE_KEY:}
  app-name: StreamApp API
