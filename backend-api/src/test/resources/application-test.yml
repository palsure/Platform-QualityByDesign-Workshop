spring:
  flyway:
    # Tests use Testcontainers with create-drop — Flyway not needed and would conflict.
    enabled: false
  jpa:
    hibernate:
      # create-drop: Hibernate creates schema from JPA entities (no Flyway needed in tests).
      # The Testcontainers PostgreSQL container starts fresh each test-class run.
      ddl-auto: create-drop
  test:
    database:
      replace: none
