# ── JUnit 5 parallel test execution ──────────────────────────────────────────
#
# Applies to ALL test tasks (unitTest, batTest, smokeTest, …).
#
# Unit tests (Mockito only, no shared state) inherit the concurrent default and
# run their methods in parallel threads → fastest possible execution.
#
# E2E / Testcontainers tests share a static Spring context + DB and some use
# @TestMethodOrder; those classes are annotated @Execution(SAME_THREAD) to opt
# out of thread parallelism.  Fork-level parallelism (maxParallelForks = 2) in
# build.gradle still runs the two E2E classes in separate JVMs simultaneously.
#
# GitHub Actions ubuntu-latest has 2 vCPUs.
# With factor = 2 → JUnit 5 uses max(2, 2 × 2) = 4 parallel threads.
# ─────────────────────────────────────────────────────────────────────────────

junit.jupiter.execution.parallel.enabled = true

# Run test methods concurrently by default.
junit.jupiter.execution.parallel.mode.default = concurrent

# Run test classes concurrently by default.
junit.jupiter.execution.parallel.mode.classes.default = concurrent

# Dynamic strategy: factor × available processors.
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 2
