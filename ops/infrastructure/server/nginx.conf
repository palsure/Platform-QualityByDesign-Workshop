events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        location /videos/ {
            alias /usr/share/nginx/html/videos/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'Range';
        }

        location = / {
            default_type text/html;
            return 200 '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><title>QoE workshop — video CDN</title></head><body><h1>Video CDN (this port)</h1><p>Serve HLS and segments from <a href="/videos/">/videos/</a>.</p><p>The <strong>web player</strong> is on port <strong>3000</strong> (same host). The REST API is on port <strong>8080</strong>.</p></body></html>';
        }

        location / {
            return 404;
        }
    }
}
