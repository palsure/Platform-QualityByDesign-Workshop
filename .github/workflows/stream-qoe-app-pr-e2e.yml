name: Stream-QoE-App-PR-E2E

# ─────────────────────────────────────────────────────────────────
# Triggers on every push to an open PR.
# Builds the full Docker stack, runs Playwright E2E QoE gate tests,
# enforces an 80 % pass-rate quality gate, then posts results as a
# PR comment and a Slack message.
#
# Quality gate threshold is controlled by the env var below.
#
# Required secrets:
#   SLACK_BOT_TOKEN   — Slack bot OAuth token (xoxb-…)
#   SLACK_CHANNEL_ID  — channel ID (e.g. C012AB3CD) not channel name
# ─────────────────────────────────────────────────────────────────

env:
  QUALITY_GATE_THRESHOLD: 80   # percent — change here to adjust the gate
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'backend-api/**'
      - 'web-player/**'
      - 'docker-compose.yml'
      - '.github/workflows/stream-qoe-app-pr-e2e.yml'

permissions:
  contents: read
  pull-requests: write   # needed to post/update the PR comment

concurrency:
  group: qoe-e2e-${{ github.ref }}
  cancel-in-progress: true   # cancel old run when new commit is pushed

jobs:
  e2e:
    name: QoE E2E Gates (Docker stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build & start the full Docker stack ─────────────────────
      - name: Build Docker images
        run: docker compose build

      - name: Start Docker stack (detached)
        run: docker compose up -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend health check (up to 120 s)…"
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/actuator/health \
               | grep -q '"status":"UP"'; then
              echo "✅ Backend ready after $((i * 5))s"
              exit 0
            fi
            printf "  attempt %d/24 — sleeping 5s\n" "$i"
            sleep 5
          done
          echo "❌ Backend did not become healthy in time — dumping logs"
          docker compose logs backend
          exit 1

      # ── Node.js + Playwright ─────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: web-player

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web-player

      # ── E2E tests ────────────────────────────────────────────────
      - name: Run E2E QoE gate tests
        id: playwright
        run: npm run e2e
        working-directory: web-player
        env:
          CI: true
          # Points Playwright at the running Docker web-player container.
          # The webServer block in playwright.config.ts is skipped when
          # this variable is set.
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        continue-on-error: true   # capture failures without stopping the job

      # ── Artifacts ────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr${{ github.event.pull_request.number }}-run${{ github.run_id }}
          path: web-player/playwright-report/
          retention-days: 14

      # ── Allure report ─────────────────────────────────────────────
      - name: Set up Java (required by Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results --clean -o allure-report
        working-directory: web-player

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-pr${{ github.event.pull_request.number }}-run${{ github.run_id }}
          path: web-player/allure-report/
          retention-days: 14

      # ── Parse results → pr-comment.md + slack-payload.json ───────
      - name: Parse test results and evaluate quality gate
        id: gate
        if: always()
        run: node .github/scripts/parse-playwright-results.js
        env:
          PR_NUMBER:               ${{ github.event.pull_request.number }}
          BRANCH_NAME:             ${{ github.head_ref }}
          PLAYWRIGHT_OUTCOME:      ${{ steps.playwright.outcome }}
          QUALITY_GATE_THRESHOLD:  ${{ env.QUALITY_GATE_THRESHOLD }}

      # ── PR comment (create or update, sticky per PR) ─────────────
      - name: Post / update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');

            // Unique marker so we can find and update the existing comment
            const MARKER = '<!-- qoe-e2e-results -->';
            const fullBody = `${MARKER}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       fullBody,
              });
              console.log('Updated existing PR comment', existing.id);
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body:         fullBody,
              });
              console.log('Created new PR comment');
            }

      # ── Slack notification ───────────────────────────────────────
      - name: Send Slack notification
        if: always() && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: ./slack-payload.json

      # ── Teardown ─────────────────────────────────────────────────
      - name: Stop Docker stack
        if: always()
        run: docker compose down -v

      # ── Quality gate enforcement ──────────────────────────────────
      - name: Enforce quality gate (≥${{ env.QUALITY_GATE_THRESHOLD }}% pass rate)
        if: always()
        run: |
          GATE="${{ steps.gate.outputs.gate_passed }}"
          RATE="${{ steps.gate.outputs.pass_rate }}"
          THRESHOLD="${{ env.QUALITY_GATE_THRESHOLD }}"

          echo "Quality Gate threshold : ${THRESHOLD}%"
          echo "Actual pass rate       : ${RATE}%"
          echo "Gate passed            : ${GATE}"

          if [ "${GATE}" != "true" ]; then
            echo ""
            echo "❌ Quality gate FAILED — pass rate ${RATE}% is below the ${THRESHOLD}% threshold."
            echo "   Fix the failing tests or lower QUALITY_GATE_THRESHOLD to unblock the PR."
            exit 1
          fi

          echo ""
          echo "✅ Quality gate PASSED — ${RATE}% ≥ ${THRESHOLD}%"
