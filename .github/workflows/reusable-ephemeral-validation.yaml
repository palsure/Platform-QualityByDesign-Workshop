name: Reusable Ephemeral Validation

# Spins up the full Docker Compose stack (postgres + backend + web-player + nginx),
# runs post-deploy smoke + k6 perf smoke, then tears down.

on:
  workflow_call:
    inputs:
      pr_id:
        required: true
        type: string
      module-name:
        required: false
        type: string
        default: ''
      thread-ts:
        required: false
        type: string
        default: ''
      slack-channel-id:
        required: false
        type: string
        default: ''
    secrets:
      SLACK_BOT_TOKEN:
        required: false
    outputs:
      smoke_passed:
        value: ${{ jobs.validate.outputs.smoke_passed }}
      perf_passed:
        value: ${{ jobs.validate.outputs.perf_passed }}
      all_passed:
        value: ${{ jobs.validate.outputs.passed }}
      report_url:
        value: ${{ jobs.validate.outputs.report_url }}

jobs:
  validate:
    name: Full-Stack Smoke + Perf
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      smoke_passed: ${{ steps.smoke-gate.outputs.passed }}
      perf_passed: ${{ steps.perf-gate.outputs.passed }}
      passed: ${{ steps.promotion-gate.outputs.passed }}
      report_url: ${{ steps.k6-publish.outputs.report_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Record job start time
        run: echo "EPHEMERAL_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build Docker Compose stack
        run: docker compose build

      - name: Start ephemeral environment
        run: |
          docker compose up -d
          echo "Ephemeral env started (PR pattern: qoe-pr-${{ inputs.pr_id }})"

      - name: Wait for backend health
        run: |
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "✅ Backend healthy"
              exit 0
            fi
            sleep 5
          done
          docker compose logs backend
          exit 1

      - name: Wait for web player
        run: |
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:3000/ | grep -qi 'streamapp\|root'; then
              echo "✅ Web player healthy"
              exit 0
            fi
            sleep 5
          done
          docker compose logs web-player
          exit 1

      - name: Run smoke tests
        id: smoke
        env:
          API_BASE: http://localhost:8080
          WEB_BASE: http://localhost:3000
        run: |
          chmod +x platform/tests/smoke/smoke-test.sh
          platform/tests/smoke/smoke-test.sh

      - name: Evaluate smoke gate
        id: smoke-gate
        if: always()
        run: |
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Install k6
        if: steps.smoke-gate.outputs.passed == 'true'
        run: |
          K6_VERSION=v0.57.0
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" -o /tmp/k6.tar.gz
          tar -xzf /tmp/k6.tar.gz -C /tmp
          sudo mv "/tmp/k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Run k6 performance smoke
        id: k6
        if: steps.smoke-gate.outputs.passed == 'true'
        env:
          API_BASE: http://localhost:8080
        run: |
          k6 run \
            --summary-export=platform/tests/load/k6-summary.json \
            platform/tests/load/load-test.js

      - name: Upload k6 summary
        if: always() && steps.k6.outcome != 'skipped' && steps.k6.outcome != 'cancelled'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ephemeral-k6-summary
          path: platform/tests/load/k6-summary.json
          if-no-files-found: ignore

      - name: Evaluate performance smoke gate
        id: perf-gate
        if: always()
        run: |
          if [ "${{ steps.smoke-gate.outputs.passed }}" != "true" ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Perf skipped — smoke gate did not pass"
            exit 0
          fi
          if [ "${{ steps.k6.outcome }}" = "success" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Promotion gate decision
        id: promotion-gate
        if: always()
        run: |
          if [ "${{ steps.smoke-gate.outputs.passed }}" = "true" ] && [ "${{ steps.perf-gate.outputs.passed }}" = "true" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Build k6 HTML report
        id: k6-report
        if: always() && steps.k6.outcome != 'skipped' && steps.k6.outcome != 'cancelled'
        continue-on-error: true
        run: |
          MODULE="${{ inputs.module-name }}"
          TITLE="Full-Stack Smoke + Perf"
          [ -n "$MODULE" ] && TITLE="[$MODULE] Full-Stack Smoke + Perf"
          python3 .github/scripts/k6_summary_to_html.py \
            platform/tests/load/k6-summary.json \
            ephemeral-k6-report \
            "$TITLE"

      - name: Publish k6 report to GitHub Pages
        id: k6-publish
        if: >-
          always() &&
          steps.k6-report.outcome == 'success' &&
          env.GH_TOKEN != ''
        continue-on-error: true
        uses: ./.github/actions/publish-static-report
        with:
          source-dir:        ephemeral-k6-report
          pages-destination: reports/${{ github.run_number }}/${{ inputs.module-name != '' && inputs.module-name || 'platform' }}/ephemeral
          github-token:      ${{ github.token }}

      - name: Write ephemeral PR summary
        if: always()
        run: |
          mkdir -p artifacts/ephemeral
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          perf = os.environ.get("PERF_PASSED", "")
          smoke = os.environ.get("SMOKE_PASSED", "")
          payload = {
              "smoke_passed": smoke == "true",
              "perf_passed": perf == "true",
              "perf_skipped": smoke != "true" or perf == "",
              "report_url": os.environ.get("REPORT_URL", ""),
          }
          Path("artifacts/ephemeral/summary.json").write_text(
              json.dumps(payload, indent=2), encoding="utf-8"
          )
          PY
        env:
          SMOKE_PASSED: ${{ steps.smoke-gate.outputs.passed }}
          PERF_PASSED: ${{ steps.perf-gate.outputs.passed }}
          REPORT_URL: ${{ steps.k6-publish.outputs.report_url }}

      - name: Upload ephemeral PR summary
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ephemeral-pr-summary
          path: artifacts/ephemeral/summary.json
          if-no-files-found: ignore

      - name: Calculate duration
        if: always()
        run: |
          if [ "${EPHEMERAL_START:-0}" -gt "0" ]; then
            ELAPSED=$(( $(date +%s) - EPHEMERAL_START ))
            MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
            [ $MINS -gt 0 ] && DUR="${MINS}m $(printf '%02d' $SECS)s" || DUR="${SECS}s"
            echo "EPHEMERAL_DURATION=$DUR" >> "$GITHUB_ENV"
          fi

      - name: Notify Slack — full-stack smoke + perf
        if: always() && inputs.module-name != '' && inputs.thread-ts != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: ./.github/actions/slack-stage-notify
        with:
          module-name:      ${{ inputs.module-name }}
          stage-name:       Full-Stack Smoke + Perf
          stage-result:     ${{ steps.promotion-gate.outputs.passed == 'true' && 'success' || 'failure' }}
          duration:         ${{ env.EPHEMERAL_DURATION }}
          report-url:       ${{ steps.k6-publish.outputs.report_url }}
          thread-ts:        ${{ inputs.thread-ts }}
          slack-bot-token:  ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel-id: ${{ inputs.slack-channel-id }}

      - name: Destroy ephemeral environment
        if: always()
        run: docker compose down -v --remove-orphans
