# Waits for every module merge gate that applies to this PR, then exposes a single
# required status check ("All quality gates passed") for branch protection.
name: PR Merge Gate

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: read
  pull-requests: read
  actions: read

concurrency:
  group: pr-merge-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  paths:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      nr: ${{ steps.filter.outputs.nr }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'backend-api/**'
              - 'platform/**'
              - 'docker-compose.yml'
              - 'docs/**'
              - 'ops/**'
              - 'README.md'
              - 'TESTING.md'
              - '.gitignore'
              - '.gitleaks.toml'
              - '.github/workflows/reusable-*.yaml'
              - '.github/workflows/streaming-app-api.yml'
              - '.github/workflows/shared-notify-build-started.yml'
              - '.github/actions/**'
              - '.github/scripts/**'
            web:
              - 'web-player/**'
              - 'platform/**'
              - 'docker-compose.yml'
              - 'docs/**'
              - 'ops/**'
              - 'README.md'
              - 'TESTING.md'
              - '.gitignore'
              - '.gitleaks.toml'
              - '.github/workflows/reusable-*.yaml'
              - '.github/workflows/streaming-app-web.yml'
              - '.github/workflows/shared-notify-build-started.yml'
              - '.github/actions/**'
              - '.github/scripts/**'
            android:
              - 'android-player/**'
              - '.github/workflows/streaming-app-android.yml'
              - '.github/workflows/shared-notify-build-started.yml'
              - '.github/actions/**'
              - '.github/scripts/stage_result_to_slack.py'
              - '.github/scripts/module_result_to_slack.py'
              - '.github/scripts/firebase_app_distribution.sh'
              - '.github/workflows/reusable-devsecops.yaml'
              - '.github/scripts/devsecops_result_to_slack.py'
              - '.github/scripts/devsecops_checks.py'
              - '.github/scripts/devsecops_gate_summary.py'
            ios:
              - 'ios-player/**'
              - '.github/workflows/streaming-app-ios.yml'
              - '.github/workflows/shared-notify-build-started.yml'
              - '.github/actions/**'
              - '.github/scripts/stage_result_to_slack.py'
              - '.github/scripts/module_result_to_slack.py'
              - '.github/workflows/reusable-devsecops.yaml'
              - '.github/scripts/devsecops_result_to_slack.py'
            nr:
              - 'ops/monitoring/newrelic/**'
              - '.github/workflows/streaming-app-newrelic.yml'
              - '.github/workflows/shared-notify-build-started.yml'
              - '.github/actions/slack-*'
              - '.github/scripts/slack_*.py'
              - '.github/scripts/stage_result_to_slack.py'
              - '.github/scripts/module_result_to_slack.py'
              - '.github/scripts/update_build_message.py'

  merge-gate:
    name: All quality gates passed
    runs-on: ubuntu-latest
    needs: paths
    timeout-minutes: 90
    steps:
      - name: Wait for module merge gates
        uses: actions/github-script@v7
        env:
          REQUIRE_API: ${{ needs.paths.outputs.api }}
          REQUIRE_WEB: ${{ needs.paths.outputs.web }}
          REQUIRE_ANDROID: ${{ needs.paths.outputs.android }}
          REQUIRE_IOS: ${{ needs.paths.outputs.ios }}
          REQUIRE_NR: ${{ needs.paths.outputs.nr }}
        with:
          script: |
            const modules = [
              { gate: 'API Merge Gate', workflowFile: 'streaming-app-api.yml', require: process.env.REQUIRE_API },
              { gate: 'Web Merge Gate', workflowFile: 'streaming-app-web.yml', require: process.env.REQUIRE_WEB },
              { gate: 'Android Merge Gate', workflowFile: 'streaming-app-android.yml', require: process.env.REQUIRE_ANDROID },
              { gate: 'iOS Merge Gate', workflowFile: 'streaming-app-ios.yml', require: process.env.REQUIRE_IOS },
              { gate: 'NR Merge Gate', workflowFile: 'streaming-app-newrelic.yml', require: process.env.REQUIRE_NR },
            ].filter((m) => m.require === 'true');

            if (modules.length === 0) {
              core.info('No module paths changed — merge gate not required for this PR.');
              return;
            }

            const sha = context.payload.pull_request.head.sha;
            const { owner, repo } = context.repo;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const startedAt = Date.now();
            const startupGraceMs = 3 * 60 * 1000;
            const startupFailMs = 8 * 60 * 1000;
            const mergeGateGraceMs = 10 * 60 * 1000;
            const deadline = Date.now() + 85 * 60 * 1000;

            core.info(`Required merge gates: ${modules.map((m) => m.gate).join(', ')}`);

            async function listWorkflowRuns() {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: sha,
                event: 'pull_request',
                per_page: 50,
              });
              return data.workflow_runs;
            }

            function workflowRunFor(runs, workflowFile) {
              const path = `.github/workflows/${workflowFile}`;
              return runs
                .filter((r) => r.path === path)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            }

            async function latestChecksByName() {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });
              const latestByName = {};
              for (const run of data.check_runs) {
                const prev = latestByName[run.name];
                if (!prev || new Date(run.started_at || 0) > new Date(prev.started_at || 0)) {
                  latestByName[run.name] = run;
                }
              }
              return latestByName;
            }

            while (Date.now() < deadline) {
              const workflowRuns = await listWorkflowRuns();
              const checks = await latestChecksByName();
              const resolved = {};
              const waiting = [];
              const neverStarted = [];

              for (const mod of modules) {
                const check = checks[mod.gate];
                if (check) {
                  resolved[mod.gate] = check;
                  continue;
                }

                const run = workflowRunFor(workflowRuns, mod.workflowFile);
                if (!run) {
                  const elapsed = Date.now() - startedAt;
                  if (elapsed < startupGraceMs) {
                    waiting.push(`${mod.gate} (pipeline not registered yet)`);
                  } else if (elapsed >= startupFailMs) {
                    neverStarted.push(`${mod.gate} → ${mod.workflowFile}`);
                  } else {
                    waiting.push(`${mod.gate} (waiting for pipeline to start)`);
                  }
                  continue;
                }

                if (run.status !== 'completed') {
                  waiting.push(`${mod.gate} (pipeline ${run.status})`);
                  continue;
                }

                const completedAgo = Date.now() - new Date(run.updated_at).getTime();
                if (completedAgo < mergeGateGraceMs) {
                  waiting.push(`${mod.gate} (workflow ${run.conclusion}, waiting for merge-gate check)`);
                  continue;
                }

                // Legacy fallback when main branch has no merge-gate job yet.
                resolved[mod.gate] = {
                  status: 'completed',
                  conclusion: run.conclusion === 'success' ? 'success' : 'failure',
                  source: 'workflow-run',
                };
              }

              if (neverStarted.length > 0) {
                core.setFailed(
                  [
                    'Required module pipelines never started for this commit:',
                    ...neverStarted.map((line) => `  • ${line}`),
                    '',
                    'GitHub loads pull_request workflows from the base branch (main).',
                    'Merge CI workflow fixes to main, push a new commit, then re-run checks.',
                  ].join('\n'),
                );
                return;
              }

              if (waiting.length > 0) {
                core.info(`Waiting: ${waiting.join('; ')}`);
                await sleep(20_000);
                continue;
              }

              const failed = Object.entries(resolved).filter(([, check]) => {
                if (check.status !== 'completed') return true;
                return check.conclusion !== 'success';
              });

              if (failed.length > 0) {
                const details = failed
                  .map(([name, check]) => {
                    const via = check.source === 'workflow-run' ? 'workflow' : 'check';
                    return `${name}=${check.conclusion} (${via})`;
                  })
                  .join(', ');
                core.setFailed(`Merge blocked — failed quality gates: ${details}`);
                return;
              }

              core.info('All required module merge gates passed.');
              return;
            }

            core.setFailed('Timed out waiting for module merge gates to complete.');
