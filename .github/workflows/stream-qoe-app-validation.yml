# Full-stack validation (parallel jobs). For an aggregate 80% pass-rate gate across platforms
# plus optional GitHub Release on main, see: stream-qoe-app-release.yml
name: Stream-QoE-App-Validation

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which modules changed ─────────────────────────────────────────
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      api:        ${{ steps.filter.outputs.api }}
      web:        ${{ steps.filter.outputs.web }}
      android:    ${{ steps.filter.outputs.android }}
      automation: ${{ steps.filter.outputs.automation }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'backend-api/**'
              - '.github/workflows/stream-qoe-app-validation.yml'
            web:
              - 'web-player/**'
              - '.github/workflows/stream-qoe-app-validation.yml'
            android:
              - 'android-player/**'
              - '.github/workflows/stream-qoe-app-validation.yml'
            automation:
              - 'qoe-automation-tests/**'
              - '.github/workflows/stream-qoe-app-validation.yml'

  # ── Backend API ───────────────────────────────────────────────────────────
  stream-qoe-app-api:
    name: Backend API Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: backend-api
      
      - name: Run API unit tests
        run: ./gradlew unitTest
        working-directory: backend-api
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: backend-api/build/test-results/unitTest

  # ── Web Player ────────────────────────────────────────────────────────────
  stream-qoe-app-web:
    name: Web Player Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
        working-directory: web-player
      
      - name: Run tests
        run: npm test
        working-directory: web-player
      
      - name: Build
        run: npm run build
        working-directory: web-player

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web-player

      - name: End-to-end QoE gates
        run: npm run e2e
        working-directory: web-player

  # ── Android Player ────────────────────────────────────────────────────────
  stream-qoe-app-android:
    name: Android Player Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.android == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-android-${{ hashFiles('android-player/**/*.gradle*') }}
      
      - name: Run tests
        run: ./gradlew test
        working-directory: android-player

  # ── Test Automation Framework ─────────────────────────────────────────────
  qoe-test-framework:
    name: Test Automation Framework
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.automation == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('qoe-automation-tests/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
      
      - name: Compile and validate test sources
        run: mvn test-compile -DskipTests
        working-directory: qoe-automation-tests

  # ── Quality Gate ──────────────────────────────────────────────────────────
  # Passes when all triggered jobs succeed.
  # Jobs that were skipped (module unchanged) do not count as failures.
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [stream-qoe-app-api, stream-qoe-app-web, stream-qoe-app-android, qoe-test-framework]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "API Tests:       ${{ needs.stream-qoe-app-api.result }}"
          echo "Web Tests:       ${{ needs.stream-qoe-app-web.result }}"
          echo "Android Tests:   ${{ needs.stream-qoe-app-android.result }}"
          echo "Test Framework:  ${{ needs.qoe-test-framework.result }}"

      - name: Fail if any triggered tests failed
        if: |
          (needs.stream-qoe-app-api.result    != 'success' && needs.stream-qoe-app-api.result    != 'skipped') ||
          (needs.stream-qoe-app-web.result    != 'success' && needs.stream-qoe-app-web.result    != 'skipped') ||
          (needs.stream-qoe-app-android.result != 'success' && needs.stream-qoe-app-android.result != 'skipped') ||
          (needs.qoe-test-framework.result != 'success' && needs.qoe-test-framework.result != 'skipped')
        run: |
          echo "One or more test suites failed"
          exit 1
