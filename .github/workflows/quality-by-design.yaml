name: Quality by Design

# PlatformCon workshop — reusable orchestrator (callable only).
#
# QBD gates (DevSecOps, contract, ephemeral validation) are integrated into:
#   - streaming-app-api.yml
#   - streaming-app-web.yml
#
# This workflow remains for external adoption (`workflow_call`) and manual
# workshop demos (`workflow_dispatch`). It is NOT triggered on push/PR in
# this repo — use the app pipelines above instead.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: qbd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID || secrets.SLACK_CHANNEL_ID }}

jobs:
  notify-start:
    uses: ./.github/workflows/shared-notify-build-started.yml
    with:
      module-name:       QBD
      product-label:     Quality by Design
      pipeline-steps:    DevSecOps → Backend gates → Web unit → Ephemeral → Promote
      environment-label: STAGE
      slack-channel-id:  ${{ vars.SLACK_CHANNEL_ID }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  devsecops:
    name: DevSecOps Defaults
    needs: [notify-start]
    uses: ./.github/workflows/reusable-devsecops.yaml
    with:
      module-name:       QBD
      thread-ts:         ${{ needs.notify-start.outputs.thread_ts }}
      slack-channel-id:  ${{ vars.SLACK_CHANNEL_ID }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  test-gates:
    name: Backend Test Gates
    uses: ./.github/workflows/reusable-test-gates.yaml

  web-unit:
    name: Web Player Unit Tests
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - name: Record job start time
        run: echo "WEB_UNIT_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & test web-player
        id: web
        working-directory: web-player
        run: |
          npm install
          npm test

      - name: Calculate web unit duration
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - ${WEB_UNIT_START:-0} ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          [ $MINS -gt 0 ] && DUR="${MINS}m $(printf '%02d' $SECS)s" || DUR="${SECS}s"
          echo "WEB_UNIT_DURATION=$DUR" >> "$GITHUB_ENV"

      - name: Evaluate web unit gate
        id: web-gate
        if: always()
        uses: ./.github/actions/evaluate-jest-gate
        with:
          test-outcome: ${{ steps.web.outcome }}
          stage-name: Web unit tests

      - name: Notify Slack — web unit result
        if: always()
        uses: ./.github/actions/slack-stage-notify
        with:
          module-name:      QBD
          stage-name:       Web Player Unit Tests
          stage-result:     ${{ steps.web.outcome }}
          duration:         ${{ env.WEB_UNIT_DURATION }}
          thread-ts:        ${{ needs.notify-start.outputs.thread_ts }}
          slack-bot-token:  ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel-id: ${{ vars.SLACK_CHANNEL_ID || secrets.SLACK_CHANNEL_ID }}

  ephemeral-validation:
    name: Full-Stack Smoke + Perf
    needs: [notify-start, test-gates]
    if: needs.test-gates.outputs.all_passed == 'true'
    uses: ./.github/workflows/reusable-ephemeral-validation.yaml
    with:
      pr_id:            ${{ github.event.pull_request.number || github.run_id }}
      module-name:      QBD
      thread-ts:        ${{ needs.notify-start.outputs.thread_ts }}
      slack-channel-id: ${{ vars.SLACK_CHANNEL_ID }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  promote:
    name: Promotion Gate
    runs-on: ubuntu-latest
    needs: [devsecops, test-gates, web-unit, ephemeral-validation]
    if: always()
    outputs:
      passed: ${{ steps.decide.outputs.passed }}
    steps:
      - name: Evaluate promotion
        id: decide
        run: |
          DEVSEC="${{ needs.devsecops.outputs.passed }}"
          TESTS="${{ needs.test-gates.outputs.all_passed }}"
          WEB="${{ needs.web-unit.result }}"
          EPHEMERAL="${{ needs.ephemeral-validation.outputs.all_passed }}"
          if [ "$DEVSEC" = "true" ] && [ "$TESTS" = "true" ] && [ "$WEB" = "success" ] && [ "$EPHEMERAL" = "true" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  qbd-report:
    name: QBD Report & Slack Summary
    runs-on: ubuntu-latest
    needs:
      - notify-start
      - devsecops
      - test-gates
      - web-unit
      - ephemeral-validation
      - promote
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Calculate total build duration
        if: always()
        run: |
          START_EPOCH="${{ needs.notify-start.outputs.start_epoch }}"
          NOW=$(date +%s)
          ELAPSED=$(( NOW - START_EPOCH ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          [ $MINS -gt 0 ] && DUR="${MINS}m ${SECS}s" || DUR="${SECS}s"
          echo "TOTAL_DURATION=$DUR" >> "$GITHUB_ENV"

      - name: Build final Slack summary payload
        if: always()
        env:
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID || secrets.SLACK_CHANNEL_ID }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_RUN_NUMBER:  ${{ github.run_number }}
          GITHUB_REF_NAME:    ${{ github.head_ref || github.ref_name }}
          GITHUB_SHA:         ${{ github.sha }}
          TOTAL_DURATION:     ${{ env.TOTAL_DURATION }}
          MODULE_NAME:        QBD
          THREAD_TS:          ${{ needs.notify-start.outputs.thread_ts }}
          STAGE1_NAME:        DevSecOps Defaults
          STAGE1_RESULT:      ${{ needs.devsecops.outputs.passed == 'true' && 'success' || 'failure' }}
          STAGE2_NAME:        Backend Unit Tests
          STAGE2_RESULT:      ${{ needs.test-gates.outputs.unit_passed == 'true' && 'success' || 'failure' }}
          STAGE3_NAME:        Backend Contract Tests
          STAGE3_RESULT:      ${{ needs.test-gates.outputs.unit_passed != 'true' && 'skipped' || (needs.test-gates.outputs.contract_passed == 'true' && 'success' || 'failure') }}
          STAGE4_NAME:        Backend Integration (BAT)
          STAGE4_RESULT:      ${{ needs.test-gates.outputs.contract_passed != 'true' && 'skipped' || (needs.test-gates.outputs.integration_passed == 'true' && 'success' || 'failure') }}
          STAGE5_NAME:        Web Player Unit Tests
          STAGE5_RESULT:      ${{ needs.web-unit.result }}
          STAGE6_NAME:        Full-Stack Smoke + Perf
          STAGE6_RESULT:      ${{ needs.ephemeral-validation.outputs.all_passed == 'true' && 'success' || (needs.ephemeral-validation.result == 'skipped' && 'skipped' || 'failure') }}
          STAGE7_NAME:        Promotion Gate
          STAGE7_RESULT:      ${{ needs.promote.outputs.passed == 'true' && 'success' || 'failure' }}
        run: python3 .github/scripts/module_result_to_slack.py

      - name: Send final summary to Slack
        if: always()
        uses: ./.github/actions/slack-pipeline-report
        with:
          thread-ts:        ${{ needs.notify-start.outputs.thread_ts }}
          module-name:      QBD
          product-label:    Quality by Design
          build-verdict:    ${{ needs.promote.outputs.passed == 'true' && 'success' || 'failure' }}
          env-label:        STAGE
          slack-bot-token:  ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel-id: ${{ vars.SLACK_CHANNEL_ID || secrets.SLACK_CHANNEL_ID }}

  pr-comment:
    name: PR Feedback
    runs-on: ubuntu-latest
    needs: [devsecops, test-gates, web-unit, ephemeral-validation, promote]
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Generate PR summary
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STAGE_DEVSECOPS: ${{ needs.devsecops.outputs.passed == 'true' && 'success' || 'failure' }}
          STAGE_UNIT: ${{ needs.test-gates.outputs.unit_passed == 'true' && 'success' || 'failure' }}
          STAGE_CONTRACT: ${{ needs.test-gates.outputs.contract_passed == 'true' && 'success' || 'failure' }}
          STAGE_INTEGRATION: ${{ needs.test-gates.outputs.integration_passed == 'true' && 'success' || 'failure' }}
          STAGE_WEB: ${{ needs.web-unit.result }}
          STAGE_EPHEMERAL: ${{ needs.ephemeral-validation.outputs.all_passed == 'true' && 'success' || (needs.ephemeral-validation.result == 'skipped' && 'skipped' || 'failure') }}
          STAGE_PROMOTE: ${{ needs.promote.outputs.passed == 'true' && 'success' || 'failure' }}
        run: python3 platform/scripts/pr-summary.py

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const MARKER = '<!-- qbd-pipeline -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
