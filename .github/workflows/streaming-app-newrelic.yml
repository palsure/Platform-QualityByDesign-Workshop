# New Relic config-as-code: validate dashboards/alerts on PRs, deploy them on main,
# and (callable) record a deployment marker in NR APM after a successful release.
#
# ── Required repo secrets (Settings → Secrets and variables → Actions → New repository secret) ──
#   NEW_RELIC_USER_API_KEY   User API key (NRAK-…). https://one.newrelic.com/api-keys → "User"
#   NEW_RELIC_ACCOUNT_ID     Numeric account ID (e.g. 7996933).
#   NEW_RELIC_APM_GUID       APM entity GUID for "StreamApp API" (used by the deployment
#                            marker). Find it in NR → APM & services → entity → "Copy entity GUID".
#                            Optional — the deployment-marker job is skipped when blank.
#
# ── Optional repo secrets ───────────────────────────────────────────────────────
#   NEW_RELIC_REGION         "us" (default) or "eu". Sets the NerdGraph endpoint.
#
# ── Triggers ────────────────────────────────────────────────────────────────────
#   PR touching ops/monitoring/newrelic/**          → validate-config
#   Push to main touching ops/monitoring/newrelic/**→ validate-config + deploy-dashboard / deploy-alerts
#   workflow_call (from streaming-app-release.yml on tag/release) → record-deployment
#   workflow_dispatch                                → run any of the jobs ad-hoc

name: Streaming App — New Relic

on:
  push:
    branches: [ main ]
    paths:
      - 'ops/monitoring/newrelic/**'
      - '.github/workflows/streaming-app-newrelic.yml'
  pull_request:
    paths:
      - 'ops/monitoring/newrelic/**'
      - '.github/workflows/streaming-app-newrelic.yml'
  workflow_dispatch:
    inputs:
      task:
        description: 'Which task to run'
        required: true
        type: choice
        options: [ validate, dashboard, alerts, all ]
        default: all
  # Allow streaming-app-release.yml to call us after a release succeeds.
  workflow_call:
    inputs:
      version:
        description: 'Version string for the deployment marker (e.g. v1.2.3)'
        required: true
        type: string
      commit:
        description: 'Commit SHA being deployed'
        required: true
        type: string
    secrets:
      NEW_RELIC_USER_API_KEY: { required: true }
      NEW_RELIC_ACCOUNT_ID:   { required: true }
      NEW_RELIC_APM_GUID:     { required: false }

concurrency:
  group: nr-sync-${{ github.ref }}
  cancel-in-progress: false

env:
  NR_REGION: ${{ secrets.NEW_RELIC_REGION || 'us' }}

jobs:
  # ── 1. Validate ───────────────────────────────────────────────────────────────
  # Runs on PRs and on every push so a malformed JSON file fails fast before it
  # ever reaches NerdGraph. Cheap (no NR API calls) so it always runs.
  validate-config:
    name: Validate NR config
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.task == 'validate' ||
      github.event.inputs.task == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Validate dashboard JSON syntax
        run: |
          shopt -s globstar nullglob
          fail=0
          for f in ops/monitoring/newrelic/dashboards/**/*.json; do
            echo "→ $f"
            if ! jq -e 'has("name") and has("pages")' "$f" >/dev/null; then
              echo "::error file=$f::missing required fields (name, pages)"
              fail=1
            fi
            if ! jq -e '.pages | all(has("widgets"))' "$f" >/dev/null; then
              echo "::error file=$f::every page must have widgets[]"
              fail=1
            fi
          done
          exit $fail

      - name: Validate alert JSON syntax
        run: |
          shopt -s globstar nullglob
          for f in ops/monitoring/newrelic/alerts/**/*.json; do
            echo "→ $f"
            jq empty "$f"
          done

      # Cheap NRQL sanity-check: every query must reference a known event type
      # and contain a SELECT. Catches accidental copy-paste errors.
      - name: Sanity-check NRQL queries
        run: |
          fail=0
          while read -r q; do
            if ! echo "$q" | grep -qiE '^\s*(SELECT|FROM)'; then
              echo "::error::NRQL doesn't look like a query: $q"
              fail=1
            fi
          done < <(jq -r '.. | .query? // empty' \
                      ops/monitoring/newrelic/dashboards/*.json \
                      ops/monitoring/newrelic/alerts/*.json 2>/dev/null)
          exit $fail

  # ── 2. Deploy dashboard ───────────────────────────────────────────────────────
  # On main only — we don't want PR previews creating throw-away dashboards in
  # the shared NR account. Re-runs install-dashboard.sh with secrets from the env.
  deploy-dashboard:
    name: Deploy dashboard
    runs-on: ubuntu-latest
    needs: validate-config
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.task == 'dashboard' || github.event.inputs.task == 'all'))
    environment: newrelic   # Use a GitHub environment with required reviewers if you want a manual gate.
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Install dashboard via NerdGraph
        env:
          NEW_RELIC_USER_API_KEY: ${{ secrets.NEW_RELIC_USER_API_KEY }}
          NEW_RELIC_ACCOUNT_ID:   ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
        run: ops/monitoring/newrelic/scripts/install-dashboard.sh

  # ── 3. Deploy alerts ──────────────────────────────────────────────────────────
  # Same shape as dashboard. The script doesn't exist yet — see the template at
  # ops/monitoring/newrelic/scripts/install-alerts.sh in the project README.
  deploy-alerts:
    name: Deploy alerts & workflow
    runs-on: ubuntu-latest
    needs: validate-config
    # hashFiles() is only allowed in step-level `if:` (the workflow
    # planner can't peek inside the repo before checkout), so the
    # "is the script present?" gate is enforced inside the run step
    # below instead of being part of the job-level condition.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.task == 'alerts' || github.event.inputs.task == 'all'))
    environment: newrelic
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Install alert policy + conditions + workflow
        env:
          NEW_RELIC_USER_API_KEY: ${{ secrets.NEW_RELIC_USER_API_KEY }}
          NEW_RELIC_ACCOUNT_ID:   ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          SLACK_DESTINATION_ID:   ${{ secrets.NEW_RELIC_SLACK_DESTINATION_ID }}
        # The install script is documented as a template in the project
        # README and may not yet exist in every branch. Treat its absence
        # as a clean skip with a warning rather than a hard failure.
        run: |
          SCRIPT=ops/monitoring/newrelic/scripts/install-alerts.sh
          if [ ! -f "$SCRIPT" ]; then
            echo "::warning title=install-alerts.sh not found::Skipping alert deployment — script not present at $SCRIPT (template path documented in README)."
            exit 0
          fi
          chmod +x "$SCRIPT"
          "$SCRIPT"

  # ── 4. Deployment marker ──────────────────────────────────────────────────────
  # Records the release in NR APM so the dashboard's "Deployments" overlay shows
  # exactly when v1.2.3 went out. Triggered only via workflow_call from the
  # release workflow (or manual dispatch with task=all on a tag).
  record-deployment:
    name: Record APM deployment marker
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_call' &&
      secrets.NEW_RELIC_APM_GUID != ''
    steps:
      - name: New Relic deployment marker
        uses: newrelic/deployment-marker-action@v2.5.0
        with:
          apiKey:    ${{ secrets.NEW_RELIC_USER_API_KEY }}
          guid:      ${{ secrets.NEW_RELIC_APM_GUID }}
          version:   ${{ inputs.version }}
          commit:    ${{ inputs.commit }}
          user:      ${{ github.actor }}
          changelog: 'Release ${{ inputs.version }} (${{ github.event.repository.html_url }}/compare/${{ inputs.commit }})'
          region:    ${{ env.NR_REGION }}
