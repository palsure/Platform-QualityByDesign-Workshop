name: Reusable DevSecOps Defaults

on:
  workflow_call:
    inputs:
      module-name:
        required: false
        type: string
        default: ''
      thread-ts:
        required: false
        type: string
        default: ''
      slack-channel-id:
        required: false
        type: string
        default: ''
    secrets:
      SLACK_BOT_TOKEN:
        required: false
    outputs:
      passed:
        value: ${{ jobs.devsecops.outputs.passed }}
      gitleaks:
        value: ${{ jobs.devsecops.outputs.gitleaks }}
      npm_audit:
        value: ${{ jobs.devsecops.outputs.npm_audit }}
      trivy:
        value: ${{ jobs.devsecops.outputs.trivy }}
      conftest:
        value: ${{ jobs.devsecops.outputs.conftest }}
      sbom_api:
        value: ${{ jobs.devsecops.outputs.sbom_api }}
      sbom_web:
        value: ${{ jobs.devsecops.outputs.sbom_web }}

jobs:
  devsecops:
    name: DevSecOps Defaults
    runs-on: ubuntu-latest
    env:
      MODULE_NAME: ${{ inputs.module-name }}
    outputs:
      passed:    ${{ steps.summary.outputs.passed }}
      gitleaks:  ${{ steps.gitleaks.outcome }}
      npm_audit: ${{ steps.npm-audit.outcome }}
      trivy:     ${{ steps.trivy.outcome }}
      conftest:  ${{ steps.conftest.outcome }}
      sbom_api:  ${{ steps.sbom-api.outcome }}
      sbom_web:  ${{ steps.sbom-web.outcome }}
    steps:
      - uses: actions/checkout@v4

      # Working-tree scan (~seconds). gitleaks-action scans full git history and
      # routinely exceeds 10+ minutes on this repo; --no-git matches local gates.
      - name: Secrets scan (Gitleaks)
        id: gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --no-git \
            --no-banner \
            --redact

      - uses: actions/setup-node@v4
        if: inputs.module-name == 'WEB' || inputs.module-name == 'QBD'
        with:
          node-version: '20'

      - name: Dependency audit (web-player npm)
        id: npm-audit
        if: inputs.module-name == 'WEB' || inputs.module-name == 'QBD'
        run: |
          cd web-player
          npm install --ignore-scripts --no-audit
          npm audit --audit-level=high

      - name: Generate SBOM — backend-api (Syft)
        id: sbom-api
        if: inputs.module-name == 'API' || inputs.module-name == 'QBD'
        uses: anchore/sbom-action@v0
        with:
          path: backend-api
          artifact-name: sbom-backend-api.spdx.json
          format: spdx-json

      - name: Generate SBOM — web-player (Syft)
        id: sbom-web
        if: inputs.module-name == 'WEB' || inputs.module-name == 'QBD'
        uses: anchore/sbom-action@v0
        with:
          path: web-player
          artifact-name: sbom-web-player.spdx.json
          format: spdx-json

      - name: Filesystem scan — backend-api (Trivy)
        id: trivy
        if: inputs.module-name == 'API' || inputs.module-name == 'QBD'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: backend-api
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Policy-as-code (Conftest)
        id: conftest
        if: inputs.module-name == 'API' || inputs.module-name == 'QBD'
        run: |
          docker run --rm \
            -v "$PWD/platform/env:/env" \
            -v "$PWD/platform/policy:/policy" \
            openpolicyagent/conftest:v0.56.0 \
            test /env/backend.yaml -p /policy

      - name: DevSecOps gate summary
        id: summary
        if: always()
        env:
          GITLEAKS:   ${{ steps.gitleaks.outcome }}
          NPM_AUDIT:  ${{ steps.npm-audit.outcome }}
          TRIVY:      ${{ steps.trivy.outcome }}
          CONFTEST:   ${{ steps.conftest.outcome }}
          SBOM_API:   ${{ steps.sbom-api.outcome }}
          SBOM_WEB:   ${{ steps.sbom-web.outcome }}
        run: python3 .github/scripts/devsecops_gate_summary.py

      - name: Upload DevSecOps PR summary
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: devsecops-pr-summary
          path: artifacts/devsecops/summary.json
          if-no-files-found: ignore

      - name: Notify Slack — DevSecOps
        if: always() && inputs.module-name != '' && inputs.thread-ts != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: ./.github/actions/slack-devsecops-notify
        with:
          module-name:      ${{ inputs.module-name }}
          gate-passed:      ${{ steps.summary.outputs.passed }}
          gitleaks:         ${{ steps.gitleaks.outcome }}
          npm-audit:        ${{ steps.npm-audit.outcome }}
          trivy:            ${{ steps.trivy.outcome }}
          conftest:         ${{ steps.conftest.outcome }}
          sbom-api:         ${{ steps.sbom-api.outcome }}
          sbom-web:         ${{ steps.sbom-web.outcome }}
          thread-ts:        ${{ inputs.thread-ts }}
          slack-bot-token:  ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel-id: ${{ inputs.slack-channel-id }}
