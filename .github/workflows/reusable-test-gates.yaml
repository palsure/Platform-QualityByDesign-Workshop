name: Reusable Test Gates (backend-api)

# Gate chain: unit → contract → integration (BAT)
# Maps to Quality-by-Design workshop stages using backend Gradle tasks.

on:
  workflow_call:
    outputs:
      unit_passed:
        value: ${{ jobs.unit.outputs.passed }}
      contract_passed:
        value: ${{ jobs.contract.outputs.passed }}
      integration_passed:
        value: ${{ jobs.integration.outputs.passed }}
      all_passed:
        value: ${{ jobs.integration.outputs.passed }}

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.gate.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend-api/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Run unit tests
        id: unit
        working-directory: backend-api
        run: ./gradlew unitTest --no-daemon
      - name: Evaluate unit gate
        id: gate
        if: always()
        run: |
          if [ "${{ steps.unit.outcome }}" = "success" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  contract:
    name: Contract Tests
    needs: unit
    if: needs.unit.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.gate.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend-api/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Run contract tests
        id: contract
        working-directory: backend-api
        run: ./gradlew contractTest --no-daemon
      - name: Evaluate contract gate
        id: gate
        if: always()
        run: |
          if [ "${{ steps.contract.outcome }}" = "success" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  integration:
    name: Integration Tests (BAT)
    needs: contract
    if: needs.contract.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.gate.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend-api/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Run BAT / integration tests
        id: integration
        working-directory: backend-api
        run: ./gradlew batTest --no-daemon
      - name: Evaluate integration gate
        id: gate
        if: always()
        run: |
          if [ "${{ steps.integration.outcome }}" = "success" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
