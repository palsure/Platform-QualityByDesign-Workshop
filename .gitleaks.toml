title = "Platform Quality by Design — Gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Known non-secret paths and mobile SDK config templates"
paths = [
  '''(?i)google-services\.json$''',
  '''(?i)GoogleService-Info\.plist$''',
  '''(?i)/\.build/''',
  '''(?i)/build/''',
  '''(?i)/\.gradle/''',
  '''(?i)node_modules/''',
  '''(?i)platform/\.local/''',
  '''(?i)allure-results/''',
  '''(?i)allure-report/''',
  '''(?i)docs/SLACK-SETUP\.md$''',
  '''(?i)docs/FIREBASE-SETUP\.md$''',
]
