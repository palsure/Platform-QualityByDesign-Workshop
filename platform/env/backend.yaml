apiVersion: apps/v1
kind: Deployment
metadata:
  name: qoe-backend
  labels:
    app: qoe-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qoe-backend
  template:
    metadata:
      labels:
        app: qoe-backend
    spec:
      containers:
        - name: backend
          image: qoe-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/qoe_db
            - name: SPRING_DATASOURCE_USERNAME
              value: qoe_user
            - name: SPRING_DATASOURCE_PASSWORD
              value: qoe_password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: qoe-backend
  labels:
    app: qoe-backend
spec:
  selector:
    app: qoe-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
